name: Release to Chrome Web Store

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build:extension

      - name: Zip dist folder
        run: zip -r snapform-${{ github.ref_name }}.zip dist

      - name: Upload to Chrome Web Store
        env:
          EXTENSION_ID: ${{ secrets.EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          ZIP_FILE: snapform-${{ github.ref_name }}.zip
        run: |
          npm install chrome-webstore-upload@4
          cat > upload.mjs <<'EOF'
          import fs from 'fs';
          import chromeWebstoreUpload from 'chrome-webstore-upload';

          const store = chromeWebstoreUpload({
            extensionId: process.env.EXTENSION_ID,
            clientId: process.env.CLIENT_ID,
            clientSecret: process.env.CLIENT_SECRET,
            refreshToken: process.env.REFRESH_TOKEN,
          });

          const zipStream = fs.createReadStream(process.env.ZIP_FILE);

          try {
            const uploadRes = await store.uploadExisting(zipStream);
            console.log('Upload successful:', uploadRes);
            const publishRes = await store.publish();
            console.log('Publish successful:', publishRes);
          } catch (err) {
            console.error('Upload/Publish failed:', err);
            process.exit(1);
          }
          EOF
          node upload.mjs

      - name: Upload artifact to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: snapform-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
