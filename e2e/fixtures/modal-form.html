<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><title>Modal Form</title>
<style>
  .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; justify-content: center; }
  .modal { background: white; padding: 24px; border-radius: 8px; min-width: 400px; }
  .hidden { display: none; }
</style>
</head>
<body>
  <!-- Background form - should be ignored when modal is open -->
  <form id="bg-form">
    <label for="bg_name">Background Name</label>
    <input id="bg_name" name="bg_name" type="text" />
  </form>

  <!-- Modal with form -->
  <div id="modal-overlay" class="overlay" role="dialog" aria-modal="true">
    <div class="modal">
      <h2>Create Account</h2>
      <form id="modal-form">
        <label for="m_name">Full Name</label>
        <input id="m_name" name="full_name" type="text" required />

        <label for="m_email">Email</label>
        <input id="m_email" name="email" type="email" required />

        <label for="m_pass">Password</label>
        <input id="m_pass" name="password" type="password" required />

        <label for="m_country">Country</label>
        <select id="m_country" name="country">
          <option value="">Select</option>
          <option value="CN">China</option>
          <option value="US">United States</option>
          <option value="JP">Japan</option>
        </select>

        <button type="submit">Register</button>
      </form>
    </div>
  </div>

  <script>
    // Toggle modal with button
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        document.getElementById('modal-overlay').classList.toggle('hidden');
      }
    });
  </script>
</body>
</html>
