<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test Form</title>
  <style>
    :root {
      --primary: #FF6F3C;
      --primary-hover: #E65A2A;
      --success: #16A34A;
      --neutral-50: #FAFAFA;
      --neutral-100: #F5F5F5;
      --neutral-200: #E5E5E5;
      --neutral-300: #D4D4D4;
      --neutral-400: #A3A3A3;
      --neutral-500: #737373;
      --neutral-600: #525252;
      --neutral-700: #404040;
      --neutral-800: #262626;
      --bg: #FAFAFA;
      --card: #FFFFFF;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--neutral-800);
      display: flex;
      justify-content: center;
      padding: 48px 16px;
    }
    .container {
      width: 100%;
      max-width: 720px;
      display: grid;
      gap: 24px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--neutral-200);
      border-radius: 14px;
      padding: 24px;
      position: relative;
    }
    .card h2 {
      margin: 0 0 18px;
      font-size: 18px;
      font-weight: 600;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 600px) {
      .row { grid-template-columns: 1fr; }
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--neutral-600);
      margin-bottom: 6px;
    }
    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid var(--neutral-200);
      border-radius: 8px;
      background: #fff;
      color: var(--neutral-800);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(255,111,60,.15);
    }
    textarea { resize: vertical; min-height: 80px; }
    .field { margin-bottom: 14px; }
    .actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 4px;
    }
    .btn {
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: 0;
    }
    .btn-primary {
      background: var(--primary);
      color: #fff;
    }
    .btn-secondary {
      background: var(--neutral-100);
      color: var(--neutral-700);
      border: 1px solid var(--neutral-200);
    }
    .floating-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 2147483647;
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(0,0,0,0.06);
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .floating-btn svg {
      width: 14px;
      height: 14px;
      fill: #FF6F3C;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card" id="card1">
      <div class="floating-btn" title="Quick Fill">
        <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </div>
      <h2 id="title">User Registration</h2>
      <div class="row">
        <div class="field">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" name="fullName" placeholder="Enter your full name">
        </div>
        <div class="field">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com">
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••">
        </div>
        <div class="field">
          <label for="country">Country / Region</label>
          <select id="country" name="country">
            <option value="">Select a country</option>
            <option value="us">United States</option>
            <option value="cn">China</option>
            <option value="uk">United Kingdom</option>
            <option value="jp">Japan</option>
            <option value="de">Germany</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label for="bio">Bio</label>
        <textarea id="bio" name="bio" placeholder="Tell us a little about yourself..."></textarea>
      </div>
      <div class="actions">
        <button type="button" class="btn btn-secondary" id="resetBtn">Reset</button>
        <button type="submit" class="btn btn-primary" id="submitBtn">Submit</button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const params = new URLSearchParams(location.search);
      const lang = params.get('lang') || 'en';
      const t = {
        en: {
          title: 'User Registration',
          fullName: 'Full Name',
          email: 'Email Address',
          password: 'Password',
          country: 'Country / Region',
          bio: 'Bio',
          reset: 'Reset',
          submit: 'Submit',
          phFullName: 'Enter your full name',
          phEmail: 'you@example.com',
          phPassword: '••••••••',
          phBio: 'Tell us a little about yourself...',
          countryDef: 'Select a country',
          us: 'United States',
          cn: 'China',
          uk: 'United Kingdom',
          jp: 'Japan',
          de: 'Germany'
        },
        zh: {
          title: '用户注册',
          fullName: '姓名',
          email: '电子邮箱',
          password: '密码',
          country: '国家 / 地区',
          bio: '个人简介',
          reset: '重置',
          submit: '提交',
          phFullName: '请输入您的姓名',
          phEmail: 'example@email.com',
          phPassword: '••••••••',
          phBio: '简单介绍一下你自己……',
          countryDef: '请选择国家',
          us: '美国',
          cn: '中国',
          uk: '英国',
          jp: '日本',
          de: '德国'
        }
      }[lang] || t.en;

      document.getElementById('title').textContent = t.title;
      document.querySelector('label[for="fullName"]').textContent = t.fullName;
      document.querySelector('label[for="email"]').textContent = t.email;
      document.querySelector('label[for="password"]').textContent = t.password;
      document.querySelector('label[for="country"]').textContent = t.country;
      document.querySelector('label[for="bio"]').textContent = t.bio;
      document.getElementById('resetBtn').textContent = t.reset;
      document.getElementById('submitBtn').textContent = t.submit;
      document.getElementById('fullName').placeholder = t.phFullName;
      document.getElementById('email').placeholder = t.phEmail;
      document.getElementById('password').placeholder = t.phPassword;
      document.getElementById('bio').placeholder = t.phBio;
      const sel = document.getElementById('country');
      sel.options[0].textContent = t.countryDef;
      sel.options[1].textContent = t.us;
      sel.options[2].textContent = t.cn;
      sel.options[3].textContent = t.uk;
      sel.options[4].textContent = t.jp;
      sel.options[5].textContent = t.de;
    })();
  </script>
</body>
</html>
